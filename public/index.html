<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Warframe Relic Finder</title>
    <!-- Иконки -->
    <link rel="icon" type="image/x-icon" href="/Favicon.ico">
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png">
    <link rel="apple-touch-icon" href="/apple-touch-icon.png">
    <!-- Стили -->
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h1>🔍 <span id="headerTitle">Warframe Relic Finder</span></h1>
        <div class="search-section">
            <div class="search-wrapper">
                <input type="text" id="searchInput" placeholder="Enter part or relic name (min. 3 chars)...">
                <ul id="suggestions"></ul>
            </div>
        </div>
        <div id="results" class="results-section"></div>
        <div id="wishlist-section" class="wishlist-section">
            <h2>📋 Wishlist</h2>
            <div id="wishlist-actions"></div>
            <ul id="wishlist-items"></ul>
        </div>
        <footer>
            <p class="disclaimer"></p>
            <p class="rarity-disclaimer"></p>
            <p>
                <a href="https://www.warframe.com" target="_blank" rel="noopener">Official Warframe Site</a> |
                <a href="https://github.com/YOUR_USERNAME/warframe-relics/issues" target="_blank" rel="noopener">Feedback & Issues</a>
            </p>
            <p class="resurgence-info">
                <a href="https://www.warframe.com/prime-resurgence" target="_blank" rel="noopener" class="resurgence-link">Prime Resurgence</a> —
                <span class="resurgence-description">During Prime Resurgence, Warframes can be obtained from Relics purchased for Aya.</span>
            </p>
            <div class="lang-switch">
                <button id="btnEn" class="lang-btn active">EN</button>
                <button id="btnRu" class="lang-btn">RU</button>
            </div>
        </footer>
    </div>
    <!-- Скрипты -->
    <script src="lang.js"></script>
    <script src="script.js"></script>
    <script>
        // Переключение языка
        document.getElementById('btnEn').addEventListener('click', () => setLanguage('en'));
        document.getElementById('btnRu').addEventListener('click', () => setLanguage('ru'));
        // Применить язык при загрузке
        applyLanguage();
        document.querySelector('.disclaimer').textContent = t('disclaimer');
        document.querySelector('.rarity-disclaimer').textContent = t('rarityDisclaimer');
        document.getElementById('headerTitle').textContent = t('title');
        // Обновим ссылку в зависимости от языка
        function updateResurgenceLink() {
            const link = document.querySelector('.resurgence-link');
            if (link) {
                link.href = currentLang === 'ru' ? 'https://www.warframe.com/ru/prime-resurgence' : 'https://www.warframe.com/prime-resurgence';
            }
        }
        updateResurgenceLink();
        // При смене языка также обновлять ссылку
        const originalSetLanguage = setLanguage;
        setLanguage = function(lang) {
            originalSetLanguage(lang);
            updateResurgenceLink();
        };
    </script>
</body>
</html>
