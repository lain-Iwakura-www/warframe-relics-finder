<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Warframe Relic Finder</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h1>🔍 Warframe Relic Finder</h1>
        <div class="search-section">
            <div class="search-wrapper">
                <input type="text" id="searchInput" placeholder="Enter part name (min. 3 characters)...">
                <ul id="suggestions"></ul>
            </div>
        </div>
        <div id="results" class="results-section">
            <!-- Results appear here -->
        </div>
        <div id="wishlist-section" class="wishlist-section">
            <h2>📋 Wishlist</h2>
            <ul id="wishlist-items"></ul>
        </div>
        <footer>
            <p>Warframe and all related content are trademarks of Digital Extremes. This is a fan-made project, not affiliated with DE.</p>
            <p><a href="https://github.com/lain-Iwakura-www/warframe-relics-helper/issues" target="_blank" rel="noopener">Feedback & Issues</a></p>
        </footer>
    </div>
    <script src="script.js"></script>
</body>
</html>
